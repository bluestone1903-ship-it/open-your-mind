<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SoundShelf - 음악 판매 홈페이지 데모</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111312;
      --panel: #181b1a;
      --panel-2: #202523;
      --text: #f4f0e7;
      --muted: #a9b4ae;
      --line: #313935;
      --accent: #f0b45f;
      --teal: #5ac8bd;
      --danger: #ef7d66;
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    a { color: inherit; text-decoration: none; }

    button, input, textarea, select {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 18px;
      border-right: 1px solid var(--line);
      background: #0f1110;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .logo {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--teal));
      color: #101312;
      font-weight: 900;
    }

    .nav {
      display: grid;
      gap: 6px;
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--muted);
    }

    .nav a.active,
    .nav a:hover {
      background: #1c211f;
      color: var(--text);
    }

    .sidebar-card {
      margin-top: 28px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #151817;
    }

    .sidebar-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .sidebar-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    main {
      min-width: 0;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 16px 28px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(17,19,18,.82);
      backdrop-filter: blur(18px);
    }

    .search {
      width: min(520px, 100%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #161a18;
      color: var(--muted);
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
    }

    .btn {
      border: 0;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    .btn.primary {
      background: var(--accent);
      color: #17120b;
      font-weight: 800;
    }

    .btn.ghost {
      border: 1px solid var(--line);
      background: transparent;
    }

    .btn.teal {
      background: var(--teal);
      color: #071211;
      font-weight: 800;
    }

    .hero {
      min-height: 520px;
      display: grid;
      grid-template-columns: minmax(320px, 0.9fr) minmax(360px, 1.1fr);
      align-items: center;
      gap: 34px;
      padding: 42px 28px 30px;
      border-bottom: 1px solid var(--line);
    }

    .hero-copy {
      max-width: 620px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--teal);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    h1 {
      margin: 18px 0 16px;
      font-size: clamp(42px, 6vw, 78px);
      line-height: .95;
      letter-spacing: 0;
    }

    .hero-copy p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hero-visual {
      min-height: 360px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.1);
      background: #171a19;
      box-shadow: 0 30px 90px rgba(0,0,0,.35);
    }

    .hero-visual img, .hero-visual video {
      width: 100%;
      height: 100%;
      min-height: 360px;
      object-fit: cover;
      display: block;
    }

    .section {
      padding: 34px 28px;
      border-bottom: 1px solid var(--line);
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h2 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0;
    }

    .section-head p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .track-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .track-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      overflow: hidden;
    }

    .cover {
      aspect-ratio: 1.25;
      position: relative;
      background:
        radial-gradient(circle at 68% 22%, rgba(90,200,189,.55), transparent 24%),
        radial-gradient(circle at 18% 72%, rgba(240,180,95,.6), transparent 28%),
        linear-gradient(135deg, #222, #182a2b 52%, #4b2c20);
    }

    .cover:after {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: 50%;
      border: 28px solid rgba(8,10,10,.42);
      background: rgba(255,255,255,.45);
      box-shadow: 0 0 0 9px rgba(255,255,255,.08);
    }

    .track-body {
      padding: 14px;
    }

    .track-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      margin-bottom: 8px;
    }

    .track-title strong {
      font-size: 17px;
    }

    .price {
      color: var(--accent);
      font-weight: 900;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      min-height: 42px;
    }

    .wave {
      display: grid;
      grid-template-columns: repeat(30, 1fr);
      align-items: end;
      gap: 3px;
      height: 46px;
      margin: 14px 0;
    }

    .wave span {
      display: block;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--teal), var(--accent));
      opacity: .8;
    }

    .track-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(320px, .9fr) minmax(380px, 1.1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 18px;
    }

    .panel h3 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101312;
      color: var(--text);
      padding: 11px 12px;
      outline: 0;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .upload-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .drop {
      min-height: 98px;
      border: 1px dashed #48524e;
      border-radius: 8px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 12px;
      background: #131715;
    }

    .checkout {
      display: grid;
      gap: 12px;
    }

    .player-box {
      display: grid;
      gap: 12px;
    }

    .now-playing {
      padding: 14px;
      border: 1px solid rgba(90,200,189,.4);
      border-radius: 8px;
      background: rgba(90,200,189,.08);
      color: #dff8f5;
      line-height: 1.55;
    }

    audio {
      width: 100%;
    }

    .order-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
    }

    .order-row strong {
      color: var(--text);
    }

    .status {
      display: none;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid rgba(90,200,189,.4);
      background: rgba(90,200,189,.09);
      color: #dff8f5;
      line-height: 1.55;
    }

    .status.show {
      display: block;
    }

    .download-box {
      display: none;
      gap: 10px;
    }

    .download-box.show {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .download-link {
      text-align: center;
    }

    .platform-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .platform {
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #151918;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      transition: border-color .2s ease, background .2s ease, color .2s ease;
    }

    .platform.ready {
      color: var(--text);
      border-color: rgba(90,200,189,.45);
      background: rgba(90,200,189,.08);
    }

    .platform.ready:hover {
      color: #071211;
      border-color: var(--teal);
      background: var(--teal);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      background: #151918;
    }

    .stat strong {
      display: block;
      margin-bottom: 8px;
      font-size: 28px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    footer {
      padding: 24px 28px 38px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .nav {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .sidebar-card { display: none; }
      .hero, .workspace {
        grid-template-columns: 1fr;
      }
      .track-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
        padding: 14px;
      }
      .hero, .section {
        padding-left: 14px;
        padding-right: 14px;
      }
      .hero {
        min-height: auto;
        padding-top: 28px;
      }
      h1 {
        font-size: 44px;
      }
      .track-grid, .upload-row, .stats {
        grid-template-columns: 1fr;
      }
      .nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .download-box.show,
      .track-actions {
        grid-template-columns: 1fr;
      }
      .platform-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">S</div>
        <div>
          <div>SoundShelf</div>
          <small style="color: var(--muted);">Artist Store</small>
        </div>
      </div>
      <nav class="nav" aria-label="주요 메뉴">
        <a class="active" href="#store">음악 판매</a>
        <a href="#upload">자료 업로드</a>
        <a href="#checkout">음악 감상</a>
        <a href="#dashboard">관리자</a>
      </nav>
      <div class="sidebar-card">
        <strong>공식 링크</strong>
        <p><a data-link="youtube" href="https://www.youtube.com/@%EC%98%A4%ED%94%88%EC%9C%A0%EC%96%B4%EB%A7%88%EC%9D%B8%EB%93%9C/" target="_blank" rel="noopener noreferrer">YouTube</a> · <a data-link="instagram" href="https://www.instagram.com/blueskyt_777/" target="_blank" rel="noopener noreferrer">Instagram</a></p>
      </div>
    </aside>

    <main>
      <header class="topbar">
        <div class="search" aria-label="검색">
          <span aria-hidden="true">⌕</span>
          <input type="search" placeholder="곡명, 앨범, 장르 검색">
        </div>
